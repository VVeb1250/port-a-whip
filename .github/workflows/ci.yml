name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e . pytest
      - run: pytest -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check portaw/ tests/

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*

  # DOGFOOD-PENDING #14 — verify per-OS install commands on real Linux/macOS runners.
  # data-query --run -y  : duckdb + jq (brew)
  # secure-agent --run -y: nah (pip) + gitleaks (brew) + osv-scanner (go) + infisical
  #   infisical: brew tap is macOS-ONLY → Linux uses npm @infisical/cli (CI proved
  #   the brew formula fails on Linux 2026-06-13; npm is the cross-platform path).
  brew-install:
    name: brew install (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install portaw
        run: pip install -e .

      # Linux osv-scanner installs via `go install` → $(go env GOPATH)/bin (~/go/bin),
      # not on PATH by default. A real go user adds it; CI mirrors that.
      # (macOS uses brew for osv-scanner — go is not even preinstalled on mac runners.)
      - name: Add Go bin to PATH (Linux)
        if: runner.os == 'Linux'
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install Homebrew (Linux)
        if: runner.os == 'Linux'
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"

      - name: Verify _os_cmd resolves brew path
        run: |
          python - <<'EOF'
          import sys
          from portaw.sets.install import _current_os, _os_cmd
          os_name = _current_os()
          assert os_name in ("linux", "macos"), f"unexpected platform: {os_name}"
          brew_field = {"windows": "winget install DuckDB.cli", "macos": "brew install duckdb", "linux": "brew install duckdb"}
          cmd = _os_cmd(brew_field, os_name)
          assert cmd == "brew install duckdb", f"bad resolution: {cmd!r}"
          print(f"[OK] {os_name} -> {cmd!r}")
          EOF

      - name: Create dummy claude config (host_config needs the dir)
        run: |
          mkdir -p ~/.claude
          echo '{"mcpServers":{}}' > ~/.claude/claude.json

      - name: portaw install data-query --run -y
        run: portaw install data-query --run -y --host claude-code

      - name: Verify data-query tools on PATH
        run: |
          duckdb --version
          jq --version

      - name: portaw install secure-agent --run -y
        run: portaw install secure-agent --run -y --host claude-code

      - name: Verify secure-agent tools on PATH
        run: |
          gitleaks version
          osv-scanner --version
          infisical --version
          nah --version
